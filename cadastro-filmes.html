<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <title>Filmes</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet">
        <link rel="stylesheet" href="./css/style.css">
    </head>

    <body>

        <nav
            class="nav-cinema py-2 px-3 d-flex align-items-center justify-content-between">

            <!-- LOGO -->
            <div class="logo-cinema">
                🎬 <strong style="color:white;">CINE<span
                        style="color:white;">CONTROL</span></strong>
            </div>

            <!-- MENU -->
            <ul class="nav ms-auto flex-wrap gap-1">
                <li class="nav-item">
                    <a href="./index.html"
                        class="nav-link text-white">Início</a>
                </li>
                <li class="nav-item">
                    <a href="./cadastro-filmes.html"
                        class="nav-link text-white">Cadastro de Filmes</a>
                </li>
                <li class="nav-item">
                    <a href="./cadastro-salas.html"
                        class="nav-link text-white">Cadastro de Salas</a>
                </li>
                <li class="nav-item">
                    <a href="./cadastro-sessoes.html"
                        class="nav-link text-white">Cadastro de Sessões</a>
                </li>
                <li class="nav-item">
                    <a href="./venda-ingressos.html"
                        class="nav-link text-white">Venda de Ingressos</a>
                </li>
                <li class="nav-item">
                    <a href="./sessoes.html" class="nav-link text-white">Sessões
                        Disponíveis</a>
                </li>
            </ul>

        </nav>

        <hr>

        <div class="container mt-4">
            <h2 class="page-title mb-3">Cadastro de Filmes</h2>
        </div>

        <form class="container mt-4 bg-dark text-light p-4 rounded border">

            <div class="row">
                <!-- Título -->
                <div class="col-md-8 mb-3">
                    <label class="form-label">Título *</label>
                    <input type="text"
                        class="form-control"
                        placeholder="Ex: Vingadores: Ultimato">
                </div>

                <!-- Gênero -->
                <div class="col-md-4 mb-3">
                    <label class="form-label">Gênero *</label>
                    <select id="genero" class="form-select">
                        <option value>Selecione</option>
                        <option>Ação</option>
                        <option>Aventura</option>
                        <option>Animação</option>
                        <option>Comédia</option>
                        <option>Drama</option>
                        <option>Ficção Científica</option>
                        <option>Horror</option>
                        <option>Romance</option>
                        <option>Suspense</option>
                        <option>Thriller</option>
                    </select>
                </div>
            </div>

            <!-- Descrição -->
            <div class="mb-3">
                <label class="form-label">Descrição</label>
                <textarea class="form-control" rows="3"
                    placeholder="Sinopse do filme..."></textarea>
            </div>

            <div class="row">
                <!-- Classificação -->
                <div class="col-md-4 mb-3">
                    <label class="form-label">Classificação Indicativa
                        *</label>
                    <select id="classificacao" class="form-select">
                        <option value>Selecione</option>
                        <option value="Livre">Livre</option>
                        <option value="10 anos">10 anos</option>
                        <option value="12 anos">12 anos</option>
                        <option value="14 anos">14 anos</option>
                        <option value="16 anos">16 anos</option>
                        <option value="18 anos">18 anos</option>
                    </select>
                </div>

                <!-- Duração -->
                <div class="col-md-4 mb-3">
                    <label class="form-label">Duração (minutos) *</label>
                    <input type="number" id="duracao" class="form-control"
                        placeholder="120" min="1">
                </div>

                <!-- Data -->
                <div class="col-md-4 mb-3">
                    <label class="form-label">Data de Estreia *</label>
                    <input type="date" id="estreia" class="form-control">
                </div>
            </div>

            <!-- Botão -->
            <div class="text-end">
                <button type="submit" class="btn btn-light">
                    Salvar Filme
                </button>
            </div>

        </form>

        <!-- LISTAGEM -->
        <div class="container mt-5">

            <h5 class="page-title mb-4">Filmes Cadastrados</h5>

            <div class="table-responsive">
                <table class="table table-dark table-hover">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Título</th>
                            <th>Gênero</th>
                            <th>Classificação</th>
                            <th>Duração</th>
                            <th>Estreia</th>
                            <th>Ação</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaFilmes">
                        <tr>
                            <td colspan="7"
                                class="text-center text-secondary py-4">
                                Nenhum filme cadastrado ainda.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>

        <script src="js/filmes.js"></script>
    </body>
</html>
