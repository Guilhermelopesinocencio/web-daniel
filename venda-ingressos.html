<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <title>Ingressos</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet">
        <link rel="stylesheet" href="./css/style.css">
    </head>

    <body>

        <nav
            class="nav-cinema py-2 px-3 d-flex align-items-center justify-content-between">

            <!-- LOGO -->
            <div class="logo-cinema">
                🎬 <strong style="color:white;">CINE<span
                        style="color:white;">CONTROL</span></strong>
            </div>

            <!-- MENU -->
            <ul class="nav ms-auto flex-wrap gap-1">
                <li class="nav-item">
                    <a href="./index.html"
                        class="nav-link text-white">Início</a>
                </li>
                <li class="nav-item">
                    <a href="./cadastro-filmes.html"
                        class="nav-link text-white">Cadastro de Filmes</a>
                </li>
                <li class="nav-item">
                    <a href="./cadastro-salas.html"
                        class="nav-link text-white">Cadastro de Salas</a>
                </li>
                <li class="nav-item">
                    <a href="./cadastro-sessoes.html"
                        class="nav-link text-white">Cadastro de Sessões</a>
                </li>
                <li class="nav-item">
                    <a href="./venda-ingressos.html"
                        class="nav-link text-white">Venda de Ingressos</a>
                </li>
                <li class="nav-item">
                    <a href="./sessoes.html" class="nav-link text-white">Sessões
                        Disponíveis</a>
                </li>
            </ul>

        </nav>

        <hr>

        <div class="container mt-4">
            <h2 class="page-title mb-3">Venda de Ingressos</h2>
        </div>

        <form class="container mt-4 bg-dark text-light p-4 rounded border">

            <div class="row mb-3">
                <div class="col-12">
                    <label class="form-label">Sessão *</label>
                    <select id="sessaoId" class="form-select"
                        onchange="atualizarPreviewSessao()">
                        <option value>— Selecione uma sessão —</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <!-- Classificação -->
                <div class="col-md-5 mb-3">
                    <label class="form-label">Nome do Cliente *</label>
                    <input type="text" id="nomeCliente"
                        class="form-control"
                        placeholder="Nome completo">
                </div>

                <!-- Duração -->
                <div class="col-md-3 mb-3">
                    <label class="form-label">CPF *</label>
                    <input type="text" id="cpf" class="form-control"
                        placeholder="000.000.000-00" maxlength="14">
                </div>

                <!-- Data -->
                <div class="col-md-2 mb-3">
                    <label class="form-label">Assento *</label>
                    <input type="text" id="assento" class="form-control"
                        placeholder="Ex: A10" maxlength="5">
                </div>

                <!-- Data -->
                <div class="col-md-2 mb-3">
                    <label class="form-label">Tipo de Pagamento
                        *</label>
                    <select id="pagamento" class="form-select">
                        <option value>Selecione</option>
                        <option value="Cartão">Cartão</option>
                        <option value="Pix">Pix</option>
                        <option value="Dinheiro">Dinheiro</option>
                    </select>
                </div>

                <!-- Botão -->
                <div class="text-end">
                    <button type="submit" class="btn btn-light">
                        Salvar Filme
                    </button>
                </div>
            </div>
        </form>

        <!-- LISTAGEM -->
        <div class="container mt-5">

            <h5 class="page-title mb-4">Ingressos Vendidos</h5>

            <div class="table-responsive">
                <table class="table table-dark table-hover">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Filme</th>
                            <th>Sala</th>
                            <th>Data/Hora</th>
                            <th>Cliente</th>
                            <th>CPF</th>
                            <th>Assento</th>
                            <th>Pagamento</th>
                            <th>Valor</th>
                            <th>Ação</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaFilmes">
                        <tr>
                            <td colspan="10"
                                class="text-center text-secondary py-4">
                                Nenhum filme cadastrado ainda.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>

        <script src="js/ingressos.js"></script>
    </body>
</html>
