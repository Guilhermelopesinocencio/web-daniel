<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <title>Salas</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet">
        <link rel="stylesheet" href="./css/style.css">
    </head>

    <body>

        <nav
            class="nav-cinema py-2 px-3 d-flex align-items-center justify-content-between">

            <!-- LOGO -->
            <div class="logo-cinema">
                🎬 <strong style="color:white;">CINE<span
                        style="color:white;">CONTROL</span></strong>
            </div>

            <!-- MENU -->
            <ul class="nav ms-auto flex-wrap gap-1">
                <li class="nav-item">
                    <a href="./index.html"
                        class="nav-link text-white">Início</a>
                </li>
                <li class="nav-item">
                    <a href="./cadastro-filmes.html"
                        class="nav-link text-white">Cadastro de Filmes</a>
                </li>
                <li class="nav-item">
                    <a href="./cadastro-salas.html"
                        class="nav-link text-white">Cadastro de Salas</a>
                </li>
                <li class="nav-item">
                    <a href="./cadastro-sessoes.html"
                        class="nav-link text-white">Cadastro de Sessões</a>
                </li>
                <li class="nav-item">
                    <a href="./venda-ingressos.html"
                        class="nav-link text-white">Venda de Ingressos</a>
                </li>
                <li class="nav-item">
                    <a href="./sessoes.html" class="nav-link text-white">Sessões
                        Disponíveis</a>
                </li>
            </ul>

        </nav>

        <hr>

        <div class="container mt-4">
            <h2>Cadastro de Salas</h2>

            <form class="container mt-4 bg-dark text-light p-4 rounded border">

                <div class="row">
                    <!-- nome sala -->
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Nome da Sala *</label>
                        <input type="text" id="nome" class="form-control"
                            placeholder="Ex: Sala 1, Sala VIP">
                    </div>

                    <!-- Capacidade -->
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Capacidade *</label>
                        <input type="number" id="capacidade"
                            class="form-control" placeholder="100" min="1">
                    </div>

                    <!-- Tipo -->
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Tipo *</label>
                        <select id="tipo" class="form-select">
                            <option value>Selecione</option>
                            <option value="2D">2D</option>
                            <option value="3D">3D</option>
                            <option value="IMAX">IMAX</option>
                        </select>
                    </div>
                </div>

                <!-- Botão -->
                <div class="text-end">
                    <button type="submit" class="btn btn-light">
                        Salvar Filme
                    </button>
                </div>

            </form>

        </div>

        <!-- LISTAGEM -->
        <div class="container mt-5">

            <h5 class="page-title mb-4">Salas Cadastradas</h5>

            <div class="table-responsive">
                <table class="table table-dark table-hover">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Nome</th>
                            <th>Capacidade</th>
                            <th>Tipo</th>
                            <th>Ação</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaFilmes">
                        <tr>
                            <td colspan="7"
                                class="text-center text-secondary py-4">
                                Nenhum sala cadastrada ainda.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>

        <script src="js/salas.js"></script>
    </body>
</html>
